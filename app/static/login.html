<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Anmelden · ServerManager</title>
  <style>
    :root {
      --bg: #08111d;
      --panel: #0d1929;
      --text: #eef5ff;
      --muted: #91a2b9;
      --line: #243a55;
      --accent: #4f8cff;
      --accent-dark: #ffffff;
      --danger: #ff8f9a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(52, 122, 171, .18), transparent 30rem),
        radial-gradient(circle at 85% 90%, rgba(79, 140, 255, .12), transparent 28rem),
        var(--bg);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .login { width: min(360px, 100%); }
    .brand {
      margin-bottom: 16px;
      color: var(--accent);
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    .card {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(13, 25, 41, .96);
      box-shadow: 0 22px 60px rgba(0, 0, 0, .32);
    }
    h1 { margin: 0 0 5px; font-size: 1.55rem; letter-spacing: -.03em; }
    .intro { margin: 0 0 20px; color: var(--muted); font-size: .8rem; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 13px; }
    label { font-size: .76rem; font-weight: 700; }
    input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      padding: 0 11px;
      color: var(--text);
      background: #09182b;
      font: inherit;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79, 140, 255, .14); }
    button {
      width: 100%;
      min-height: 42px;
      margin-top: 4px;
      border: 0;
      border-radius: 8px;
      color: var(--accent-dark);
      background: var(--accent);
      font: 800 .82rem/1 inherit;
      cursor: pointer;
    }
    .error {
      display: none;
      margin: 0 0 13px;
      padding: 9px 10px;
      border: 1px solid rgba(255, 143, 154, .35);
      border-radius: 8px;
      color: var(--danger);
      background: rgba(255, 143, 154, .07);
      font-size: .75rem;
    }
    .error.visible { display: block; }
    .footer { margin: 13px 0 0; color: var(--muted); font-size: .7rem; text-align: center; }
  </style>
</head>
<body>
  <main class="login">
    <div class="brand">ServerManager · RDP Gateway</div>
    <form class="card" method="post" action="/login">
      <h1>Anmelden</h1>
      <p class="intro">Zugriff auf die Serververwaltung</p>
      <div class="error" id="error" role="alert"></div>
      <div class="field">
        <label for="username">Benutzername</label>
        <input id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Anmelden</button>
    </form>
    <p class="footer">Geschützter administrativer Zugriff</p>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const error = document.querySelector("#error");
    if (params.has("locked")) {
      error.textContent = "Zu viele Fehlversuche. Bitte in einigen Minuten erneut versuchen.";
      error.classList.add("visible");
    } else if (params.has("error")) {
      error.textContent = "Benutzername oder Passwort ist nicht korrekt.";
      error.classList.add("visible");
    }
  </script>
</body>
</html>
