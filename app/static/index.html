<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="csrf-token" content="__CSRF_TOKEN__">
  <title>ServerManager</title>
  <style>
    :root {
      --bg: #08111d;
      --panel: #0d1929;
      --panel-soft: #111f32;
      --text: #eef5ff;
      --muted: #91a2b9;
      --line: #243a55;
      --accent: #4f8cff;
      --accent-dark: #ffffff;
      --danger: #ff8f9a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 8%, rgba(52, 122, 171, .16), transparent 30rem),
        radial-gradient(circle at 90% 90%, rgba(79, 140, 255, .12), transparent 28rem),
        var(--bg);
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    main {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }
    #launcher {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      justify-content: center;
    }
    #launcher[hidden] { display: none; }
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }
    .eyebrow {
      color: var(--accent);
      font-size: .68rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    h1 {
      margin: 4px 0 0;
      font-size: clamp(1.65rem, 3vw, 2.15rem);
      line-height: 1.1;
      letter-spacing: -.035em;
    }
    .intro {
      max-width: 340px;
      margin: 0 0 2px;
      color: var(--muted);
      font-size: .8rem;
      text-align: right;
    }
    .header-actions { display: flex; align-items: flex-end; gap: 14px; }
    .logout {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      color: var(--muted);
      background: var(--panel-soft);
      font-size: .72rem;
    }
    .logout:hover { color: var(--text); border-color: #365272; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(13, 25, 41, .94);
      box-shadow: 0 16px 45px rgba(0, 0, 0, .26);
    }
    form { padding: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 128px; gap: 14px; }
    .credentials { grid-template-columns: 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 13px; }
    label { color: #dce8f8; font-size: .76rem; font-weight: 700; }
    input, select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      padding: 0 11px;
      color: var(--text);
      background: #09182b;
      font-size: .85rem;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, .14);
    }
    input::placeholder { color: #687c97; }
    .options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin: 1px 0 15px; }
    .toggle {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-height: 62px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel-soft);
      cursor: pointer;
    }
    .toggle:hover { border-color: #365272; }
    .toggle input { flex: 0 0 auto; width: 15px; height: 15px; margin: 2px 0 0; accent-color: var(--accent); }
    .toggle strong { display: block; font-size: .78rem; }
    .toggle small { display: block; margin-top: 2px; color: var(--muted); font-size: .67rem; line-height: 1.3; }
    .primary {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      color: var(--accent-dark);
      background: var(--accent);
      font-size: .82rem;
      font-weight: 800;
    }
    .primary:hover { filter: brightness(1.05); }
    button:disabled { cursor: wait; opacity: .6; }
    .message { min-height: 18px; margin: -4px 0 7px; color: var(--danger); font-size: .75rem; }
    .viewer { display: none; height: 100vh; background: #03070c; overflow: hidden; }
    .viewer.active { display: grid; grid-template-rows: 44px minmax(0, 1fr); }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      font-size: .78rem;
    }
    .toolbar strong { margin-right: auto; }
    .toolbar button {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      color: var(--text);
      background: var(--panel-soft);
      font-size: .72rem;
    }
    .toolbar .disconnect { border-color: rgba(255, 143, 154, .45); color: var(--danger); }
    #screen { min-width: 0; min-height: 0; overflow: hidden; background: #03070c; }
    #screen canvas { outline: none; }
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 6px;
      border-radius: 50%;
      background: #ffbf69;
    }
    .status-dot.connected { background: var(--accent); }
    @media (max-width: 760px) {
      main { padding: 20px 0; }
      .page-header { display: block; margin-bottom: 14px; }
      .intro { max-width: none; margin-top: 7px; text-align: left; }
      .header-actions { align-items: center; justify-content: space-between; }
      .grid, .credentials, .options { grid-template-columns: 1fr; gap: 0; }
      .options { gap: 7px; }
      form { padding: 15px; }
      .toolbar strong { display: none; }
    }
  </style>
</head>
<body>
  <main id="launcher">
    <header class="page-header">
      <div>
        <div class="eyebrow">ServerManager · RDP Gateway</div>
        <h1>Neue Remotedesktop-Sitzung</h1>
      </div>
      <div class="header-actions">
        <p class="intro">Isolierte Browsersitzung. Zugangsdaten werden nicht gespeichert.</p>
        <button class="logout" id="logout" type="button">Abmelden</button>
      </div>
    </header>

    <form class="card" id="connectionForm" novalidate>
      <div class="grid">
        <div class="field">
          <label for="host">Server-IP oder Hostname</label>
          <input id="host" autocomplete="off" placeholder="10.20.30.40 oder srv-admin-01" required>
        </div>
        <div class="field">
          <label for="port">RDP-Port</label>
          <input id="port" type="number" inputmode="numeric" min="1" max="65535" value="3389" required>
        </div>
      </div>

      <div class="grid credentials">
        <div class="field">
          <label for="username">Benutzername</label>
          <input id="username" autocomplete="username" placeholder="administrator" required>
        </div>
        <div class="field">
          <label for="domain">Domäne (optional)</label>
          <input id="domain" autocomplete="organization" placeholder="CONTOSO">
        </div>
      </div>

      <div class="grid credentials">
        <div class="field">
          <label for="password">Passwort</label>
          <input id="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="field">
          <label for="resolution">Auflösung</label>
          <select id="resolution">
            <option value="1920x1080">1920 × 1080</option>
            <option value="1600x900" selected>1600 × 900</option>
            <option value="1366x768">1366 × 768</option>
            <option value="1280x720">1280 × 720</option>
          </select>
        </div>
      </div>

      <div class="options">
        <label class="toggle">
          <input id="admin" type="checkbox">
          <span><strong>Admin-Console</strong><small>Administrative Sitzung direkt auf dem Zielserver.</small></span>
        </label>
        <label class="toggle">
          <input id="clipboard" type="checkbox" checked>
          <span><strong>Zwischenablage</strong><small>RDP-Clipboard für Text aktivieren.</small></span>
        </label>
        <label class="toggle">
          <input id="ignoreCertificate" type="checkbox">
          <span><strong>Zertifikat ignorieren</strong><small>Nur bei vertrauenswürdigen internen Servern nutzen.</small></span>
        </label>
      </div>

      <div class="message" id="message" role="alert" aria-live="polite"></div>
      <button class="primary" id="connectButton" type="submit">Browser-Sitzung starten</button>
    </form>
  </main>

  <section class="viewer" id="viewer">
    <div class="toolbar">
      <strong><span class="status-dot" id="statusDot"></span><span id="status">Verbindung wird aufgebaut</span></strong>
      <button type="button" id="ctrlAltDel">Strg + Alt + Entf</button>
      <button type="button" id="fullscreen">Vollbild</button>
      <button class="disconnect" type="button" id="disconnect">Trennen</button>
    </div>
    <div id="screen"></div>
  </section>

  <script type="module">
    import RFB from "/novnc/core/rfb.js";

    const form = document.querySelector("#connectionForm");
    const launcher = document.querySelector("#launcher");
    const viewer = document.querySelector("#viewer");
    const screen = document.querySelector("#screen");
    const message = document.querySelector("#message");
    const connectButton = document.querySelector("#connectButton");
    const status = document.querySelector("#status");
    const statusDot = document.querySelector("#statusDot");
    const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    let rfb = null;
    let sessionId = null;

    function setMessage(text) {
      message.textContent = text;
    }

    async function readResponse(response) {
      const text = await response.text();
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch {
        return {
          error: response.ok
            ? "Der Server hat eine ungültige Antwort geliefert."
            : `Serverfehler ${response.status}: ${text.trim().slice(0, 240)}`
        };
      }
    }

    async function closeSession() {
      if (rfb) {
        try { rfb.disconnect(); } catch {}
        rfb = null;
      }
      if (sessionId) {
        const id = sessionId;
        sessionId = null;
        try {
          await fetch(`/api/sessions/${id}`, {
            method: "DELETE",
            headers: { "X-CSRF-Token": csrfToken }
          });
        } catch {}
      }
      screen.replaceChildren();
      viewer.classList.remove("active");
      launcher.hidden = false;
      document.querySelector("#password").value = "";
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      setMessage("");
      connectButton.disabled = true;
      connectButton.textContent = "Sitzung wird vorbereitet ...";

      const payload = {
        host: document.querySelector("#host").value.trim(),
        port: Number(document.querySelector("#port").value),
        username: document.querySelector("#username").value.trim(),
        domain: document.querySelector("#domain").value.trim(),
        password: document.querySelector("#password").value,
        resolution: document.querySelector("#resolution").value,
        admin: document.querySelector("#admin").checked,
        clipboard: document.querySelector("#clipboard").checked,
        ignoreCertificate: document.querySelector("#ignoreCertificate").checked
      };

      try {
        const response = await fetch("/api/sessions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRF-Token": csrfToken
          },
          body: JSON.stringify(payload)
        });
        const result = await readResponse(response);
        if (!response.ok) throw new Error(result.error || "Die Sitzung konnte nicht gestartet werden.");

        document.querySelector("#password").value = "";
        sessionId = result.id;
        launcher.hidden = true;
        viewer.classList.add("active");
        status.textContent = "Verbindung wird aufgebaut";
        statusDot.classList.remove("connected");

        const scheme = location.protocol === "https:" ? "wss" : "ws";
        const websocketUrl = `${scheme}://${location.host}${result.websocket}`;
        rfb = new RFB(screen, websocketUrl);
        rfb.scaleViewport = true;
        rfb.resizeSession = false;
        rfb.focusOnClick = true;

        rfb.addEventListener("connect", () => {
          status.textContent = `${payload.host}:${payload.port}`;
          statusDot.classList.add("connected");
          rfb.focus();
        });
        rfb.addEventListener("disconnect", event => {
          statusDot.classList.remove("connected");
          status.textContent = event.detail.clean ? "Sitzung beendet" : "Verbindung unterbrochen";
        });
        rfb.addEventListener("securityfailure", event => {
          status.textContent = event.detail.reason || "VNC-Sicherheitsfehler";
        });
      } catch (error) {
        setMessage(error.message);
      } finally {
        connectButton.disabled = false;
        connectButton.textContent = "Browser-Sitzung starten";
      }
    });

    document.querySelector("#ctrlAltDel").addEventListener("click", () => rfb?.sendCtrlAltDel());
    document.querySelector("#fullscreen").addEventListener("click", () => viewer.requestFullscreen());
    document.querySelector("#disconnect").addEventListener("click", closeSession);
    document.querySelector("#logout").addEventListener("click", async () => {
      await closeSession();
      await fetch("/logout", {
        method: "POST",
        headers: { "X-CSRF-Token": csrfToken }
      });
      location.assign("/login");
    });
    window.addEventListener("beforeunload", () => {
      if (sessionId) {
        fetch(`/api/sessions/${sessionId}`, {
          method: "DELETE",
          headers: { "X-CSRF-Token": csrfToken },
          keepalive: true
        }).catch(() => {});
      }
    });
  </script>
</body>
</html>
