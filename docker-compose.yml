services:
  servermanager:
    build: .
    restart: unless-stopped
    environment:
      APP_USERNAME: ${APP_USERNAME:?APP_USERNAME must be set}
      APP_PASSWORD: ${APP_PASSWORD:?APP_PASSWORD must be set}
      PUBLIC_URL: ${PUBLIC_URL:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      DATABASE_PATH: /data/servermanager.db
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-ServerManager}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      TOTP_ISSUER: ${TOTP_ISSUER:-ServerManager}
      AUTH_SESSION_SECONDS: ${AUTH_SESSION_SECONDS:-28800}
      MAX_SESSIONS: ${MAX_SESSIONS:-10}
      MAX_SESSION_SECONDS: ${MAX_SESSION_SECONDS:-28800}
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:8080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /home/servermanager:size=64m,uid=10001,gid=10001,mode=700
    volumes:
      - servermanager_data:/data
    pids_limit: 256
    mem_limit: 2g
    cpus: 2.0

volumes:
  servermanager_data:
